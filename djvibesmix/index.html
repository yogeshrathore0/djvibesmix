<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DJ VIBE MIX PREMIUM PACKS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #c62828;
      --primary-dark: #8b1e1e;
      --bg-light: #fcf9f9;
      --card-bg: #ffffff;
      --text-dark: #1e1e2a;
      --text-muted: #5e5e72;
      --shadow-hover: 0 24px 44px -16px rgba(180, 0, 0, 0.35);
      --border-radius-card: 24px;
      --border-radius-btn: 60px;
      --transition: all 0.25s ease;
    }
    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(8, 8, 16, 0.92);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 2rem;
      z-index: 1000;
      border-bottom: 2px solid var(--primary);
    }
    .logo {
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(130deg, #fff, #fbb5b5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .profile-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      background: #2b2b3a;
    }
    .main {
      flex: 1;
      margin-top: 76px;
      width: 100%;
    }
    section {
      padding: 4rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      align-items: center;
    }
    .hero-content h1 {
      font-size: 2.4rem;
      font-weight: 800;
      border-left: 6px solid var(--primary);
      padding-left: 1.2rem;
    }
    .hero-sub {
      font-size: 1.7rem;
      font-weight: 600;
      margin: 1.2rem 0;
    }
    .hero-btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1.4rem;
      padding: 1rem 3.2rem;
      border-radius: var(--border-radius-btn);
      text-decoration: none;
    }
    .hero-image {
      max-width: 380px;
      width: 100%;
      border-radius: 40px;
    }
    @media (min-width: 720px) {
      .hero-grid { grid-template-columns: 1fr 1fr; }
    }
    .section-title {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 2.5rem;
      border-bottom: 4px solid var(--primary);
      display: inline-block;
    }
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    @media (min-width: 600px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .product-card {
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      overflow: hidden;
      box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1);
      transition: var(--transition);
      border: 1px solid rgba(198,40,40,0.15);
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }
    .product-image {
      aspect-ratio: 1/1;
      background-color: #1f1f2b;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-content {
      padding: 1.5rem 1.2rem;
    }
    .product-name {
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .rating-stars {
      color: #f5b342;
      margin-bottom: 0.5rem;
    }
    .songs-badge {
      background: #ffe9e9;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      display: inline-block;
      margin: 0.5rem 0;
    }
    .price-block {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1rem 0;
    }
    .old-price {
      font-size: 1.1rem;
      color: #a3a3b5;
      text-decoration: line-through;
    }
    .new-price {
      background: var(--primary);
      color: white;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-weight: 700;
    }
    .card-btn {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      font-weight: 700;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      width: 100%;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: var(--transition);
    }
    .card-btn:hover {
      background: var(--primary);
      color: white;
    }
    .bundle-btn {
      border: 2px solid #ff8f00;
      color: #ff8f00;
    }
    .footer {
      background: #0c0c14;
      color: #bdbdd0;
      text-align: center;
      padding: 2.5rem;
      border-top: 3px solid var(--primary);
      margin-top: 2.5rem;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.2rem 0;
    }
    .social-links a {
      color: #f0f0f0;
      font-size: 1.8rem;
      transition: var(--transition);
    }
    .social-links a:hover {
      color: var(--primary);
      transform: translateY(-3px);
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .popup-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .popup-card {
      background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
      padding: 2.5rem 2rem;
      border-radius: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 3px solid var(--primary);
      transform: scale(0.8);
      transition: all 0.3s ease;
    }
    .popup-overlay.show .popup-card {
      transform: scale(1);
    }
    .popup-icon {
      font-size: 4rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    .popup-card h2 {
      color: white;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
    .popup-card p {
      color: #bdbdd0;
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    .popup-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .popup-btn {
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      min-width: 120px;
    }
    .popup-btn-yes {
      background: var(--primary);
      color: white;
    }
    .popup-btn-no {
      background: transparent;
      color: white;
      border: 2px solid #5e5e72;
    }
  </style>
</head>
<body>

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-card">
      <div class="popup-icon">🎧</div>
      <h2>Hey DJ!</h2>
      <p>Are you interested in buying DJ collection?</p>
      <div class="popup-buttons">
        <button class="popup-btn popup-btn-yes" id="popupYes">Yes</button>
        <button class="popup-btn popup-btn-no" id="popupNo">No</button>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">DJ VIBE MIX</div>
    <img class="profile-icon" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="profile">
  </nav>

  <main class="main">
    <!-- HERO SECTION -->
    <section id="home">
      <div class="hero-grid">
        <div class="hero-content">
          <h1>Original DJ Song Collection</h1>
          <div class="hero-sub">320K MP3 High Quality song</div>
          <a href="#product-section" class="hero-btn" id="homeBuyBtn">Buy Now →</a>
        </div>
        <div class="hero-media">
          <img class="hero-image" src="https://png.pngtree.com/png-clipart/20241121/original/pngtree-vector-beautiful-hand-painted-dj-png-image_17282214.png" alt="DJ">
        </div>
      </div>
    </section>

    <!-- PRODUCT SECTION -->
    <section id="product-section">
      <h2 class="section-title">🎧 collections</h2>
      <div class="product-grid" id="productGrid"></div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="social-links">
      <a href="https://www.instagram.com/djvibesmix09" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://t.me/djvibesmix099" target="_blank"><i class="fab fa-telegram"></i></a>
    </div>
    <div>© 2026 DJ VIBE MIX — professional DJ packs</div>
  </footer>

  <script>
(function() {
  // ========== BAS SETTINGS ==========
  const BOT_TOKEN = '8405410928:AAEnSHF_15r2fnBTe91DTyp4BelDvJ4gpgE';
  const YOUR_CHAT_ID = '2026506367';
  const BOT_USERNAME = 'djvibesmix_bot';  // YAHAN APNA BOT USERNAME DALO
  // ==================================

  // POPUP CODE
  const popup = document.getElementById('popupOverlay');
  document.getElementById('popupYes').addEventListener('click', function() {
    popup.classList.remove('show');
    document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
  });
  document.getElementById('popupNo').addEventListener('click', function() {
    popup.classList.remove('show');
  });
  setTimeout(() => popup.classList.add('show'), 500);

  // HOME BUTTON
  document.getElementById('homeBuyBtn').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
  });

  // PRODUCTS LIST
  const products = [
    "Holi Dhamaka 150 BPM Pack", "New Bollywood", "New Wedding", "Haldi Ceremony",
    "Punjabi Latest Extended Pack", "Bhojpuri Power Dance Collection", "CG New Song DJ Remix Pack",
    "CG Folk Fusion DJ Mix", "Ram Navmi Bhakti Bass Pack", "Mandla Festival DJ Collection",
    "Hindi Party Nonstop 2026", "English Club Vibe Extended Mix", "Bollywood Love Mashup Pro",
    "Sambalpuri Trol Dance Mix", "DJ Bass Booster Ultimate Pack", "Navratri Garba Energy Mix",
    "Ganpati Visarjan DJ Thunder", "Ladies Sangeet Dance Hits", "Baraat Entry Blast Edition",
    "EDM Night 150 BPM Special", "Desi Hip Hop Party Drop", "South Indian Mass DJ Mix",
    "Trap & Trol Bass Machine", "Romantic Reverb Slow Jams", "Instrumental DJ Pro Edits",
    "Independence Day Desh Bhakti Mix", "Birthday Bash Celebration Pack", "New Year Countdown DJ Blast",
    "90s Bollywood Retro Reboot", "Haryanvi Dance Floor Pack", "Club House Electro Vibes",
    "Item Song High Energy Mix", "Sufi Night Spiritual Beats", "Wedding Grand Entry Pro"
  ];

  const container = document.getElementById('productGrid');
  if (!container) return;

  // RATING FUNCTIONS
  function randomRating() { return (4.0 + Math.random() * 1.0).toFixed(1); }
  function renderStars(r) {
    r = parseFloat(r);
    let stars = '';
    for (let i = 0; i < Math.floor(r); i++) stars += '<i class="fas fa-star"></i>';
    if (r - Math.floor(r) >= 0.5) stars += '<i class="fas fa-star-half-alt"></i>';
    return stars;
  }

  // LOCATION FUNCTION (bina permission ke)
  function getLocation(callback) {
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => callback(`${d.city || 'Unknown'}, ${d.country_name || 'Unknown'}`))
      .catch(() => callback('Unknown'));
  }

  // TELEGRAM PE MSG BHEJO (username ke saath)
  function sendToTelegram(product, price) {
    getLocation(function(location) {
      // Pehla msg - username ke bina
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: YOUR_CHAT_ID,
          text: `🔔 *New Order*\n📦 ${product}\n💰 ${price}\n📍 ${location}\n⏰ ${new Date().toLocaleString()}\n\n👤 *Username: user Telegram mein ja raha hai...*`,
          parse_mode: 'Markdown'
        })
      });

      // Jab user Telegram mein jayega, BOT automatically username capture karega
      // Uske liye BOT ko run karna hoga (Python code neeche diya hai)
    });
  }

  // ALL IN ONE BUNDLE
  const bundleCard = document.createElement('div');
  bundleCard.className = 'product-card';
  
  const bundleImg = document.createElement('div');
  bundleImg.className = 'product-image';
  bundleImg.innerHTML = '<img src="image/All in One Bundle.png" alt="Bundle" onerror="this.src=\'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23ff8f00%22%2F%3E%3Ctext%20x%3D%2210%22%20y%3D%2255%22%20fill%3D%22%23fff%22%3EBUNDLE%3C%2Ftext%3E%3C%2Fsvg%3E\'">';
  
  const bundleContent = document.createElement('div');
  bundleContent.className = 'product-content';
  bundleContent.innerHTML = `
    <div class="product-name">⭐ ALL IN ONE BUNDLE (40 Packs)</div>
    <div class="rating-stars">${'<i class="fas fa-star"></i>'.repeat(5)} <span>(5.0)</span></div>
    <div class="songs-badge">7000+ songs</div>
    <div class="product-desc">🎧 320K MP3 • Complete Collection</div>
    <div class="price-block"><span class="old-price">₹4999</span><span class="new-price">₹999</span></div>
  `;
  
  const bundleBtn = document.createElement('a');
  bundleBtn.href = `https://t.me/${BOT_USERNAME}?start=bundle`;
  bundleBtn.target = '_blank';
  bundleBtn.className = 'card-btn bundle-btn';
  bundleBtn.textContent = 'Buy Bundle';
  
  bundleBtn.addEventListener('click', function() {
    sendToTelegram('ALL IN ONE BUNDLE', '₹999');
  });
  
  bundleContent.appendChild(bundleBtn);
  bundleCard.appendChild(bundleImg);
  bundleCard.appendChild(bundleContent);
  container.appendChild(bundleCard);

  // REGULAR PRODUCTS
  products.forEach(name => {
    const rating = randomRating();
    const card = document.createElement('div');
    card.className = 'product-card';
    
    const imgDiv = document.createElement('div');
    imgDiv.className = 'product-image';
    imgDiv.innerHTML = `<img src="image/${encodeURIComponent(name)}.png" alt="${name}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23c62828%22%2F%3E%3Ctext%20x%3D%2210%22%20y%3D%2255%22%20fill%3D%22%23fff%22%3E${name.substring(0,3)}%3C%2Ftext%3E%3C%2Fsvg%3E'">`;
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'product-content';
    contentDiv.innerHTML = `
      <div class="product-name">${name}</div>
      <div class="rating-stars">${renderStars(rating)} <span>(${rating})</span></div>
      <div class="songs-badge">250+ songs</div>
      <div class="product-desc">🎧 320K MP3</div>
      <div class="price-block"><span class="old-price">₹299</span><span class="new-price">₹199</span></div>
    `;
    
    const buyBtn = document.createElement('a');
    buyBtn.href = `https://t.me/${BOT_USERNAME}?start=product`;
    buyBtn.target = '_blank';
    buyBtn.className = 'card-btn';
    buyBtn.textContent = 'Buy Now';
    
    buyBtn.addEventListener('click', function() {
      sendToTelegram(name, '₹199');
    });
    
    contentDiv.appendChild(buyBtn);
    card.appendChild(imgDiv);
    card.appendChild(contentDiv);
    container.appendChild(card);
  });
})();
</script>
</body>
</html>
